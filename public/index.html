<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life-Flow Multi Tracker</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Quill 
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
  -->

  <link href="/quill/quill.snow.css" rel="stylesheet">
  <script src="/quill/quill.min.js"></script>

  <style>
    .line-clamp-3 {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .line-clamp-4 {
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .ql-editor {
      min-height: 300px;
      max-height: 500px;
      overflow-y: auto;
      word-wrap: break-word;
    }
    .ql-divider {
      height: 0;
      margin: 20px 0;
      border-top: 1px solid #ccc;
      display: block;
    }
    #ticker-content {
      animation: ticker-scroll 30s linear infinite;
    }
    @keyframes ticker-scroll {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }
    .ql-editor img {
      max-width: 100%;
      height: auto;
    }
    .ql-video {
      width: 100%;
      height: auto;
      aspect-ratio: 16/9;
    }
    .ql-toolbar .ql-divider {
      width: 24px;
      height: 24px;
      display: inline-block;
      text-align: center;
      line-height: 24px;
      cursor: pointer;
    }
  </style>
</head>

<body class=" text-slate-900 min-h-screen p-4">

  <div class="max-w-[95vw] mx-auto">

    <!-- HEADER -->
    <div class="flex flex-col gap-4 mb-6">

      <!-- Navigation Row -->
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-4">
          <button onclick="prevWeek()" class="px-4 py-2  rounded-xl hover:">←</button>
          <h1 id="month-title" class="text-3xl font-bold"></h1>
          <button onclick="nextWeek()" class="px-4 py-2  rounded-xl hover:">→</button>
        </div>

        <div class="flex gap-2">
          <button id="today-btn" onclick="today()" class="px-4 py-2 rounded-xl text-white bg-blue-500 hover:bg-blue-400">Today</button>

          <button id="export-btn" onclick="exportData()" class="px-4 py-2 rounded-xl text-white bg-blue-500 hover:bg-blue-400">Export</button>

          <label class="px-4 py-2 rounded-xl text-white bg-purple-500 hover:bg-purple-400 cursor-pointer">
            Import
            <input type="file" accept=".json" onchange="importData(event)" class="hidden">
          </label>
        </div>
      </div>

      <!-- Calendar Selector -->
      <div class="flex items-center justify-between gap-4">
        <div class="flex items-center gap-3">
          <span class="text-sm text-slate-500">Calendar:</span>
          <select id="calendar-select" class="bg-white border border-slate-300 rounded-xl px-3 py-2 text-sm shadow-sm"></select>
        </div>

        <div class="flex items-center gap-2">
          <button onclick="showCalendarForm('create')" class="px-3 py-2 text-sm  rounded-xl hover:">New Calendar</button>
          <button onclick="showCalendarForm('edit')" class="px-3 py-2 text-sm  rounded-xl hover:">Edit</button>
          <button onclick="deleteCurrentCalendar()" class="px-3 py-2 text-sm bg-red-500 text-white rounded-xl hover:bg-red-400">Delete</button>
        </div>
      </div>
    </div>

    <!-- Ticker -->
    <div id="ticker-wrapper" class="w-full h-8 overflow-hidden relative bg-white rounded-lg shadow mb-4">
      <div id="ticker-content" class="absolute whitespace-nowrap flex items-center h-full px-2"></div>
    </div>

<div id="day-name-row" class="grid grid-cols-7 w-full text-center font-semibold mb-2">
  <div class="py-2 text-red-500 font-bold">Saturday</div>
  <div class="py-2 text-red-600 font-bold">Sunday</div>
  <div class="py-2 text-gray-600">Monday</div>
  <div class="py-2 text-gray-600">Tuesday</div>
  <div class="py-2 text-gray-600">Wednesday</div>
  <div class="py-2 text-gray-600">|Thursday</div>
  <div class="py-2 text-gray-600">Friday</div>
</div>


    <!-- CALENDAR GRID -->
    <div id="calendar" class="grid grid-cols-7 gap-4 p-4 bg-white rounded-3xl shadow"></div>


    <!-- NOTE MODAL -->
    <div id="note-modal" class="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50 hidden">
      <div class="bg-white rounded-3xl w-full max-w-4xl max-h-[90vh] flex flex-col shadow-xl">

        <div class="p-6 border-b border-slate-200 flex justify-between items-center">
          <h2 id="modal-date-display" class="text-2xl font-bold"></h2>
          <button onclick="closeModal()" class="text-3xl leading-none">×</button>
        </div>

        <div class="flex-1 flex flex-col md:flex-row overflow-auto">
          <div id="editor-container" class="flex-1 p-6"></div>

          <div class="w-full md:w-96 border-l border-slate-200 flex flex-col">

            <!-- Reminders -->
            <div class="p-6 border-b border-slate-200">
              <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-amber-600">Reminders</h3>
                <button onclick="showReminderForm()" class="text-2xl leading-none">+</button>
              </div>
              <div id="modal-reminders-list" class="max-h-40 overflow-y-auto"></div>
            </div>

            <!-- Tasks -->
            <div class="p-6 flex-1">
              <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-blue-600">Task Orders</h3>
                <button onclick="showTaskForm()" class="text-2xl leading-none">+</button>
              </div>
              <div id="modal-tasks-list" class="max-h-40 overflow-y-auto"></div>
            </div>

          </div>
        </div>
      </div>
    </div>


    <!-- REMINDER FORM -->
    <div id="reminder-form" class="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50 hidden">
      <div class="bg-white rounded-3xl w-full max-w-md p-6 shadow-xl">
        <h3 class="text-xl font-bold mb-4">Create Reminder</h3>

        <div class="space-y-4">
          <input type="text" id="reminder-subject-input" placeholder="Subject" class="w-full  rounded-2xl px-4 py-3">
          <input type="text" id="reminder-desc-input" placeholder="Description (optional)" class="w-full  rounded-2xl px-4 py-3">
          <input type="time" id="reminder-time-input" class="w-full  rounded-2xl px-4 py-3">

          <div class="flex gap-3">
            <button onclick="hideReminderForm()" class="flex-1 py-3 rounded-2xl border border-slate-300">Cancel</button>
            <button onclick="saveReminder()" class="flex-1 py-3 rounded-2xl bg-amber-500 text-white">Save</button>
          </div>
        </div>
      </div>
    </div>


    <!-- TASK FORM -->
    <div id="task-form" class="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50 hidden">
      <div class="bg-white rounded-3xl w-full max-w-md p-6 shadow-xl">
        <h3 class="text-xl font-bold mb-4">Create Task Order</h3>

        <div class="space-y-4">
          <input type="text" id="task-subject-input" placeholder="Subject" class="w-full  rounded-2xl px-4 py-3">
          <textarea id="task-desc-textarea" placeholder="Description (optional)" class="w-full  rounded-2xl px-4 py-3 h-24"></textarea>
          <input type="datetime-local" id="task-start-input" class="w-full  rounded-2xl px-4 py-3">
          <input type="datetime-local" id="task-end-input" class="w-full  rounded-2xl px-4 py-3">

          <select id="task-status-select" class="w-full  rounded-2xl px-4 py-3">
            <option value="Not Started">Not Started</option>
            <option value="Working">Working</option>
            <option value="Completed">Completed</option>
          </select>

          <div class="flex gap-3">
            <button onclick="hideTaskForm()" class="flex-1 py-3 rounded-2xl border border-slate-300">Cancel</button>
            <button onclick="saveTask()" class="flex-1 py-3 rounded-2xl bg-blue-500 text-white">Save</button>
          </div>
        </div>
      </div>
    </div>


    <!-- CALENDAR FORM -->
    <div id="calendar-form-modal" class="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50 hidden">
      <div class="bg-white rounded-3xl w-full max-w-md p-6 shadow-xl">
        <h3 id="calendar-form-title" class="text-xl font-bold mb-4">New Calendar</h3>

        <div class="space-y-4">
          <input type="text" id="calendar-name-input" placeholder="Calendar name (e.g. Diet, Finances)" class="w-full  rounded-2xl px-4 py-3">

          <div>
            <label class="block text-sm text-slate-500 mb-2">Color theme</label>
            <select id="calendar-color-select" class="w-full  rounded-2xl px-4 py-3">
              <option value="blue">Blue</option>
              <option value="green">Green</option>
              <option value="amber">Amber</option>
              <option value="purple">Purple</option>
              <option value="rose">Rose</option>
              <option value="emerald">Emerald</option>
            </select>
          </div>

          <div class="flex gap-3">
            <button onclick="hideCalendarForm()" class="flex-1 py-3 rounded-2xl border border-slate-300">Cancel</button>
            <button onclick="saveCalendarFromForm()" class="flex-1 py-3 rounded-2xl bg-blue-500 text-white">Save</button>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
