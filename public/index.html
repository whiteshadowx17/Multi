<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MultiFlow Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
  <style>
    .line-clamp-3 {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .line-clamp-4 {
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .ql-editor {
      min-height: 300px;
    }
    #ticker-content {
      animation: ticker-scroll 30s linear infinite;
    }
    @keyframes ticker-scroll {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-8">
  <div class="max-w-7xl mx-auto">
    <div class="flex items-center justify-between mb-8">
      <div class="flex items-center gap-4">
        <button onclick="prevWeek()" class="px-4 py-2 bg-slate-800 rounded-xl hover:bg-slate-700">←</button>
        <h1 id="month-title" class="text-3xl font-bold"></h1>
        <button onclick="nextWeek()" class="px-4 py-2 bg-slate-800 rounded-xl hover:bg-slate-700">→</button>
      </div>
      <button onclick="today()" class="px-4 py-2 bg-blue-600 rounded-xl hover:bg-blue-500">Today</button>
    </div>

    <!-- Calendar Grid -->
    <div id="calendar" class="grid grid-cols-7 gap-4"></div>

    <!-- Note Modal -->
    <div id="note-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 hidden">
      <div class="bg-slate-800 rounded-3xl w-full max-w-4xl max-h-[90vh] flex flex-col">
        <div class="p-6 border-b border-slate-700 flex justify-between items-center">
          <h2 id="modal-date-display" class="text-2xl font-bold"></h2>
          <button onclick="closeModal()" class="text-3xl leading-none">×</button>
        </div>
        
        <div class="flex-1 flex flex-col md:flex-row overflow-auto">
          <div id="editor-container" class="flex-1 p-6"></div>
          
          <div class="w-full md:w-96 border-l border-slate-700 flex flex-col">
            <!-- Reminders Section -->
            <div class="p-6 border-b border-slate-700">
              <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-amber-400">Reminders</h3>
                <button onclick="showReminderForm()" class="text-2xl leading-none">+</button>
              </div>
              <div id="modal-reminders-list" class="max-h-40 overflow-y-auto"></div>
            </div>
            
            <!-- Tasks Section -->
            <div class="p-6 flex-1">
              <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-blue-400">Task Orders</h3>
                <button onclick="showTaskForm()" class="text-2xl leading-none">+</button>
              </div>
              <div id="modal-tasks-list" class="max-h-40 overflow-y-auto"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Reminder Form Modal -->
    <div id="reminder-form" class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 hidden">
      <div class="bg-slate-800 rounded-3xl w-full max-w-md p-6">
        <h3 class="text-xl font-bold mb-4">Create Reminder</h3>
        <div class="space-y-4">
          <input type="text" id="reminder-subject-input" name="reminder-subject" placeholder="Subject" class="w-full bg-slate-900 rounded-2xl px-4 py-3" autocomplete="off">
          <input type="text" id="reminder-desc-input" name="reminder-description" placeholder="Description (optional)" class="w-full bg-slate-900 rounded-2xl px-4 py-3" autocomplete="off">
          <input type="time" id="reminder-time-input" name="reminder-time" class="w-full bg-slate-900 rounded-2xl px-4 py-3" autocomplete="off">
          <div class="flex gap-3">
            <button type="button" onclick="hideReminderForm()" class="flex-1 py-3 rounded-2xl border border-slate-700">Cancel</button>
            <button type="button" onclick="saveReminder()" class="flex-1 py-3 rounded-2xl bg-amber-600">Save</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Task Form Modal -->
    <div id="task-form" class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 hidden">
      <div class="bg-slate-800 rounded-3xl w-full max-w-md p-6">
        <h3 class="text-xl font-bold mb-4">Create Task Order</h3>
        <div class="space-y-4">
          <input type="text" id="task-subject-input" name="task-subject" placeholder="Subject" class="w-full bg-slate-900 rounded-2xl px-4 py-3" autocomplete="off">
          <textarea id="task-desc-textarea" name="task-description" placeholder="Description (optional)" class="w-full bg-slate-900 rounded-2xl px-4 py-3 h-24" autocomplete="off"></textarea>
          <input type="datetime-local" id="task-start-input" name="task-start" class="w-full bg-slate-900 rounded-2xl px-4 py-3" autocomplete="off">
          <input type="datetime-local" id="task-end-input" name="task-end" class="w-full bg-slate-900 rounded-2xl px-4 py-3" autocomplete="off">
          <select id="task-status-select" name="task-status" class="w-full bg-slate-900 rounded-2xl px-4 py-3">
            <option value="Not Started">Not Started</option>
            <option value="Working">Working</option>
            <option value="Completed">Completed</option>
          </select>
          <div class="flex gap-3">
            <button type="button" onclick="hideTaskForm()" class="flex-1 py-3 rounded-2xl border border-slate-700">Cancel</button>
            <button type="button" onclick="saveTask()" class="flex-1 py-3 rounded-2xl bg-blue-600">Save</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
