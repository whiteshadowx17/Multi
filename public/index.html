<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950 text-slate-100">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MultiFlow Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.min.js"></script>
  <style>
    .calendar-cell {
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      background-size: cover;
      background-position: center;
    }
    .calendar-cell .overlay {
      background: linear-gradient(to bottom, rgba(15,23,42,0.35), rgba(15,23,42,0.75));
    }
  </style>
</head>
<body class="h-full flex flex-col bg-slate-950">

  <div class="flex-1 flex flex-col overflow-hidden">
    <!-- Header -->
    <div class="px-8 py-6 border-b border-slate-800 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <button onclick="prevWeek()" class="px-5 py-2 hover:bg-slate-800 rounded-xl text-xl">←</button>
        <div id="month-title" class="text-2xl font-medium"></div>
        <button onclick="nextWeek()" class="px-5 py-2 hover:bg-slate-800 rounded-xl text-xl">→</button>
      </div>
      <button onclick="today()" class="px-8 py-3 bg-blue-600 hover:bg-blue-500 rounded-2xl text-sm font-medium">Today</button>
    </div>

    <!-- Calendar -->
    <div class="flex-1 p-8 overflow-auto">
      <div class="grid grid-cols-7 gap-6 mb-6 text-center text-sm font-medium text-slate-400">
        <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
      </div>
      <div id="calendar" class="grid grid-cols-7 gap-6"></div>
    </div>
  </div>

  <!-- Note Modal -->
  <div id="note-modal" onclick="if(event.target.id==='note-modal') closeModal()" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div onclick="event.stopImmediatePropagation()" class="bg-slate-900 w-full max-w-6xl mx-4 h-[92vh] rounded-3xl shadow-2xl flex flex-col overflow-hidden">
      <div class="px-8 py-5 border-b flex items-center justify-between">
        <span id="modal-date" class="text-xl font-medium"></span>
        <div class="flex gap-4">
          <button onclick="showReminderForm()" class="flex items-center gap-2 text-amber-400 hover:text-amber-300">🛎️ Reminder</button>
          <button onclick="showTaskForm()" class="flex items-center gap-2 text-emerald-400 hover:text-emerald-300">📋 Task</button>
          <button onclick="closeModal()" class="px-6 py-2 text-slate-400 hover:text-white">Done</button>
        </div>
      </div>

      <!-- Reminders & Tasks List -->
      <div class="px-8 py-4 border-b bg-slate-950 grid grid-cols-2 gap-6">
        <div>
          <h3 class="text-amber-400 text-sm font-medium mb-3">Reminders</h3>
          <div id="modal-reminders-list" class="space-y-2 max-h-48 overflow-auto"></div>
        </div>
        <div>
          <h3 class="text-emerald-400 text-sm font-medium mb-3">Tasks</h3>
          <div id="modal-tasks-list" class="space-y-2 max-h-48 overflow-auto"></div>
        </div>
      </div>

      <div id="editor-container" class="flex-1 p-8 overflow-auto"></div>
    </div>
  </div>

  <!-- Reminder Form -->
  <div id="reminder-form" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[60]">
    <div class="bg-slate-900 w-full max-w-md mx-4 rounded-3xl p-8">
      <h2 class="text-xl font-medium mb-6">New Reminder</h2>
      <input id="reminder-subject" type="text" placeholder="Subject" class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-4 py-3 mb-4">
      <textarea id="reminder-desc" placeholder="Description (optional)" class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-4 py-3 h-24 mb-4"></textarea>
      <input id="reminder-time" type="time" class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-4 py-3 mb-6">
      <div class="flex gap-3">
        <button onclick="hideReminderForm()" class="flex-1 py-3 text-slate-400 hover:bg-slate-800 rounded-2xl">Cancel</button>
        <button onclick="saveReminder()" class="flex-1 py-3 bg-amber-500 hover:bg-amber-600 rounded-2xl">Save</button>
      </div>
    </div>
  </div>

  <!-- Task Form -->
  <div id="task-form" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[60]">
    <div class="bg-slate-900 w-full max-w-md mx-4 rounded-3xl p-8">
      <h2 class="text-xl font-medium mb-6">New Task / Work Order</h2>
      <input id="task-subject" type="text" placeholder="Subject" class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-4 py-3 mb-4">
      <textarea id="task-desc" placeholder="Description" class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-4 py-3 h-24 mb-4"></textarea>
      
      <div class="grid grid-cols-2 gap-4 mb-4">
        <div>
          <label class="text-xs text-slate-400 block mb-1">Start</label>
          <input id="task-start" type="datetime-local" class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-4 py-3">
        </div>
        <div>
          <label class="text-xs text-slate-400 block mb-1">Finish</label>
          <input id="task-end" type="datetime-local" class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-4 py-3">
        </div>
      </div>

      <div class="mb-6">
        <label class="text-xs text-slate-400 block mb-1">Status</label>
        <select id="task-status" class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-4 py-3">
          <option value="Not Started">Not Started</option>
          <option value="Working">Working</option>
          <option value="Completed">Completed</option>
        </select>
      </div>

      <div class="flex gap-3">
        <button onclick="hideTaskForm()" class="flex-1 py-3 text-slate-400 hover:bg-slate-800 rounded-2xl">Cancel</button>
        <button onclick="saveTask()" class="flex-1 py-3 bg-emerald-500 hover:bg-emerald-600 rounded-2xl">Save Task</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
